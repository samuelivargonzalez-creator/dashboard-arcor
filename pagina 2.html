<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard MUNDIAL - Cobertura Vendedores</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

:root {
  --bg: #0d0f14;
  --card: #141720;
  --card2: #1a1e2a;
  --border: #252a38;
  --text: #e8eaf0;
  --muted: #6b7280;
  --mogul: #f97316;
  --mentho: #22d3ee;
  --rocklets: #a855f7;
  --saladix: #10b981;
  --tortuguita: #f43f5e;
  --ok: #22c55e;
  --warn: #eab308;
  --bad: #ef4444;
  --accent: #3b82f6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a1e2a 0%, #0d0f14 100%);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.logo span {
  color: var(--tortuguita);
}

.badge-mes {
  background: var(--accent);
  color: #fff;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* VENDEDOR SELECT */
.filter-bar {
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}

.filter-bar select {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Barlow', sans-serif;
  outline: none;
  appearance: none;
  cursor: pointer;
}

.filter-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

/* MAIN CONTENT */
.content {
  padding: 12px 16px;
}

/* RESUMEN VENDEDOR */
.vendor-header {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

.vendor-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.vendor-meta {
  display: flex;
  gap: 16px;
  margin-top: 8px;
}

.vendor-stat {
  display: flex;
  flex-direction: column;
}

.vendor-stat-val {
  font-size: 20px;
  font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  color: var(--accent);
}

.vendor-stat-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* LINES GRID */
.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
  margin-top: 14px;
}

.lines-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.line-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}

.line-card:active { transform: scale(0.98); }

.line-card.selected { border-color: var(--accent); }

.line-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.line-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.line-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-ok { background: rgba(34,197,94,0.15); color: var(--ok); }
.badge-warn { background: rgba(234,179,8,0.15); color: var(--warn); }
.badge-bad { background: rgba(239,68,68,0.15); color: var(--bad); }

.progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.progress-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.progress-pct {
  font-size: 14px;
  font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  min-width: 44px;
  text-align: right;
}

.line-amounts {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}

.line-amount-item {
  display: flex;
  flex-direction: column;
}

.line-amount-val {
  font-size: 13px;
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
}

.line-amount-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
}

/* META LINE */
.meta-marker {
  position: absolute;
  top: 0;
  height: 100%;
  width: 2px;
  background: rgba(255,255,255,0.4);
}

/* CLIENTES TAB */
.search-box {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Barlow', sans-serif;
  width: 100%;
  outline: none;
  margin-bottom: 10px;
}

.line-filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  margin-bottom: 10px;
}
.line-filter-row::-webkit-scrollbar { display: none; }

.lf-btn {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}

.lf-btn.active {
  color: #fff;
  border-color: currentColor;
}

.cliente-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.cliente-item {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  background: var(--card);
  border-radius: 6px;
  gap: 8px;
}

.cliente-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-ok { background: var(--ok); }
.status-no { background: var(--bad); opacity: 0.6; }

.cliente-name {
  font-size: 13px;
  flex: 1;
}

.cliente-barrio {
  font-size: 10px;
  color: var(--muted);
}

.cliente-lines {
  display: flex;
  gap: 3px;
}

.cl-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  opacity: 0.3;
}

.cl-dot.bought { opacity: 1; }

/* HISTORICO TAB */
.hist-table {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 12px;
}

.hist-table-head {
  display: grid;
  grid-template-columns: 1fr repeat(4, 80px);
  padding: 8px 10px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--muted);
  letter-spacing: 0.5px;
  gap: 4px;
  overflow-x: auto;
}

.hist-row {
  display: grid;
  grid-template-columns: 1fr repeat(4, 80px);
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  gap: 4px;
}

.hist-row:last-child { border-bottom: none; }

.hist-row-abril { background: rgba(59,130,246,0.05); }

.hist-cell {
  display: flex;
  flex-direction: column;
}

.hist-cell-val {
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
}

.hist-cell-sub {
  font-size: 10px;
  color: var(--muted);
}

/* RESUMEN GENERAL TAB */
.summary-table {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.sum-row {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}

.sum-row:last-child { border-bottom: none; }

.sum-row-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.sum-vendor-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  text-transform: uppercase;
}

.sum-clientes {
  font-size: 11px;
  color: var(--muted);
}

.sum-lines-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.sum-line-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
  border: 1px solid transparent;
}

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
}

.empty-icon {
  font-size: 36px;
  margin-bottom: 8px;
}

/* LEGEND */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--muted);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* LOADING */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* TRENDLINE MINI */
.trend-bar-row {
  display: flex;
  gap: 3px;
  align-items: flex-end;
  height: 24px;
}

.trend-bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  min-height: 3px;
  transition: height 0.3s;
}

/* COUNT CHIPS */
.chip-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 4px;
}

.chip {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 600;
}

/* Santiago romero note */
.note-banner {
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11px;
  color: #93c5fd;
  margin-bottom: 12px;
  line-height: 1.4;
}

</style>
</head>

</div>

const LINE_COLORS = {
  'MOGUL': '#f97316',
  'MENTHO PLUS': '#22d3ee',
  'ROCKLETS': '#a855f7',
  'SALADIX': '#10b981',
  'TORTUGUITA': '#f43f5e'
};

const LINE_METAS = {
  'MOGUL': 0.80,
  'MENTHO PLUS': 0.60,
  'ROCKLETS': 0.80,
  'SALADIX': 0.80,
  'TORTUGUITA': 0.90
};

const MONTHS = ['01-Enero','02-Febrero','03-Marzo','04-Abril'];
const MONTH_LABELS = ['Ene','Feb','Mar','Abr'];

let currentVendor = null;
let currentTab = 'cobertura';
let filterGrupo = 'TODOS';      // TODOS | COMPRADORES | NO_COMPRADORES
let filterLinea = 'TODAS';      // TODAS | TORTUGUITA | MOGUL | ROCKLETS | SALADIX | MENTHO PLUS
let clienteFilter = '';

function formatGs(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toString();
}

function pctColor(pct, meta) {
  if (pct >= meta) return '#22c55e';
  if (pct >= meta * 0.7) return '#eab308';
  return '#ef4444';
}

function pctBadge(pct, meta) {
  const p = (pct * 100).toFixed(0) + '%';
  if (pct >= meta) return `<span class="line-badge badge-ok">✓ ${p}</span>`;
  if (pct >= meta * 0.7) return `<span class="line-badge badge-warn">⚠ ${p}</span>`;
  return `<span class="line-badge badge-bad">✗ ${p}</span>`;
}

// Init
function init() {
  const sel = document.getElementById('vendedorSelect');
  Object.keys(DATA).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v === 'SANTIAGO ROMERO' ? 'Santiago Romero' : v;
    sel.appendChild(opt);
  });
  currentVendor = Object.keys(DATA)[0];
  renderAll();
}

function onVendedorChange() {
  currentVendor = document.getElementById('vendedorSelect').value;
  renderAll();
}

function renderAll() {
  renderCobertura();
  renderClientes();
  renderHistorico();
  renderResumen();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab')[['cobertura','clientes','historico','resumen'].indexOf(tab)].classList.add('active');
}

// ===== COBERTURA =====
function renderCobertura() {
  const v = DATA[currentVendor];
  const lines = v.lines;
  const vname = currentVendor === 'SANTIAGO ROMERO' ? 'Santiago Romero' : currentVendor;
  
  let html = '';

  // Note for Santiago Romero
  if (currentVendor === 'SANTIAGO ROMERO') {
    html += `<div class="note-banner">ℹ️ <strong>Santiago Romero</strong> asumió en abril. Incluye histórico de Cristhian Luis Cano y Wilfrido Maidana Nuñez.</div>`;
  }

  // Vendor header
  const totalGs = Object.values(lines).reduce((s,l) => s + l.total_vendido, 0);
  const uniqueCompradores = new Set(Object.values(lines).flatMap(l => l.compradores)).size;
  
  html += `
  <div class="vendor-header">
    <div class="vendor-name">${vname}</div>
    <div class="vendor-meta">
      <div class="vendor-stat">
        <span class="vendor-stat-val">${v.total_clientes_ruta}</span>
        <span class="vendor-stat-label">Clientes Ruta</span>
      </div>
      <div class="vendor-stat">
        <span class="vendor-stat-val">${uniqueCompradores}</span>
        <span class="vendor-stat-label">Compradores Abr</span>
      </div>
      <div class="vendor-stat">
        <span class="vendor-stat-val">Gs ${formatGs(totalGs)}</span>
        <span class="vendor-stat-label">Total Vendido</span>
      </div>
    </div>
  </div>`;

  html += `<div class="section-title">Cobertura por Línea · Abril 2026</div>`;
  html += `<div class="lines-grid">`;

  ['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].forEach(line => {
    const ld = lines[line];
    const meta = ld.meta_pct;
    const pct = ld.cobertura_pct;
    const color = LINE_COLORS[line];
    const fillColor = pctColor(pct, meta);
    const fillW = Math.min((pct / meta) * 100, 100);
    const metaW = 100; // meta is always 100% of the track

    html += `
    <div class="line-card" style="border-left-color:${color}">
      <div class="line-header">
        <span class="line-name" style="color:${color}">${line}</span>
        ${pctBadge(pct, meta)}
      </div>
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill" style="width:${fillW}%;background:${fillColor}"></div>
          <div class="meta-marker" style="left:100%"></div>
        </div>
        <span class="progress-pct" style="color:${fillColor}">${(pct*100).toFixed(1)}%</span>
      </div>
      <div class="progress-meta">
        <span>${ld.total_compradores} compradores / ${v.total_clientes_ruta} clientes</span>
        <span>Meta: ${(meta*100).toFixed(0)}%</span>
      </div>
      <div class="line-amounts">
        <div class="line-amount-item">
          <span class="line-amount-val">Gs ${formatGs(ld.total_vendido)}</span>
          <span class="line-amount-label">Vendido Abril</span>
        </div>
        <div class="line-amount-item">
          <span class="line-amount-val">${((pct/meta)*100).toFixed(0)}%</span>
          <span class="line-amount-label">vs Meta</span>
        </div>
        <div class="line-amount-item">
          <span class="line-amount-val">${v.total_clientes_ruta - ld.total_compradores}</span>
          <span class="line-amount-label">Sin Comprar</span>
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('cobertura-content').innerHTML = html;
}

// ===== CLIENTES =====
function renderClientes() {
  const v = DATA[currentVendor];
  const lines_data = v.lines;

  // Build set of compradores per line (lowercase)
  const compradoresByLine = {};
  ['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].forEach(line => {
    compradoresByLine[line] = new Set(
      (lines_data[line]?.compradores || []).map(n => n.toLowerCase().trim())
    );
  });

  // Deduplicate ruta clients by name
  const rutaClientes = v.clientes_ruta || [];
  const seen = new Set();
  const uniqueClientes = rutaClientes.filter(c => {
    const key = c.nombre.toLowerCase().trim();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Tag each client with which lines they bought
  const withStatus = uniqueClientes.map(c => {
    const nameKey = c.nombre.toLowerCase().trim();
    const bought = {};
    ['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].forEach(line => {
      bought[line] = compradoresByLine[line].has(nameKey) ||
        [...compradoresByLine[line]].some(cp =>
          cp.includes(nameKey.substring(0, 10)) || nameKey.includes(cp.substring(0, 10))
        );
    });
    const anyBought = Object.values(bought).some(b => b);
    return { ...c, bought, anyBought };
  });

  // ---- Apply dual filter ----
  // 1. Text search
  const search = (document.getElementById('clienteSearch')?.value || clienteFilter).toLowerCase();
  let filtered = withStatus;
  if (search) {
    filtered = filtered.filter(c =>
      c.nombre.toLowerCase().includes(search) || c.barrio.toLowerCase().includes(search)
    );
  }

  // 2. Grupo (TODOS / COMPRADORES / NO_COMPRADORES) × Línea (TODAS / specific)
  const lineaActiva = filterLinea !== 'TODAS';

  filtered = filtered.filter(c => {
    const boughtLine = lineaActiva ? c.bought[filterLinea] : null;

    if (filterGrupo === 'COMPRADORES') {
      // Must have bought — if line selected, must have bought THAT line
      return lineaActiva ? boughtLine : c.anyBought;
    } else if (filterGrupo === 'NO_COMPRADORES') {
      // Must NOT have bought — if line selected, must NOT have bought THAT line
      return lineaActiva ? !boughtLine : !c.anyBought;
    } else {
      // TODOS — if line selected, show all but the indicator dot reflects that line
      return true;
    }
  });

  // Stats
  const totalRuta = uniqueClientes.length;
  const totalCompraron = withStatus.filter(c => c.anyBought).length;

  // ---- Build UI ----
  // Grupo filter row
  const grupoButtons = [
    { key: 'TODOS',          label: 'Todos',         bg: '#3b82f6' },
    { key: 'COMPRADORES',    label: '✓ Compradores', bg: '#22c55e' },
    { key: 'NO_COMPRADORES', label: '✗ No Compró',  bg: '#ef4444' },
  ];

  // Line filter row
  const lineaButtons = [
    { key: 'TODAS', label: 'Todas las líneas', bg: '#6b7280' },
    ...['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].map(l => ({
      key: l, label: l, bg: LINE_COLORS[l]
    }))
  ];

  let html = `
  <input type="text" class="search-box" placeholder="🔍 Buscar cliente o barrio..."
    id="clienteSearch" oninput="filterClientes()" value="${clienteFilter}">

  <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;margin-bottom:5px">¿Quiénes?</div>
  <div class="line-filter-row" style="margin-bottom:10px">
    ${grupoButtons.map(b => `
      <button class="lf-btn" style="${filterGrupo===b.key ? `background:${b.bg};border-color:${b.bg};color:#fff` : ''}"
        onclick="setGrupoFilter('${b.key}')">${b.label}</button>
    `).join('')}
  </div>

  <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;margin-bottom:5px">¿De qué línea?</div>
  <div class="line-filter-row" style="margin-bottom:12px">
    ${lineaButtons.map(b => `
      <button class="lf-btn" style="${filterLinea===b.key ? `background:${b.bg};border-color:${b.bg};color:#fff` : ''}"
        onclick="setLineaFilter('${b.key}')">${b.label.split(' ')[0]}</button>
    `).join('')}
  </div>`;

  // Active filter summary pill
  if (filterGrupo !== 'TODOS' || filterLinea !== 'TODAS') {
    const gLabel = grupoButtons.find(b => b.key === filterGrupo)?.label || '';
    const lLabel = filterLinea === 'TODAS' ? 'todas las líneas' : filterLinea;
    html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;padding:6px 10px;background:rgba(59,130,246,0.1);border-radius:8px;border:1px solid rgba(59,130,246,0.25)">
      <span style="font-size:11px;color:#93c5fd;flex:1">🔎 ${gLabel} · ${lLabel}</span>

    </div>`;
  }

  // Count row
  html += `<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px;color:var(--muted)">

    <span>✓ <strong style="color:#22c55e">${totalCompraron}</strong> compraron · ✗ <strong style="color:#ef4444">${totalRuta - totalCompraron}</strong> no</span>
  </div>`;

  // Dot legend
  html += `<div class="legend" style="margin-bottom:8px">
    ${['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].map(l =>
      `<div class="legend-item"><div class="legend-dot" style="background:${LINE_COLORS[l]}"></div><span style="font-size:10px">${l.split(' ')[0]}</span></div>`
    ).join('')}
  </div>`;

  // Client list
  html += `<div class="cliente-list">`;

  filtered.slice(0, 300).forEach(c => {
    // Status dot = relevant to active line filter, or any-bought if no line filter
    const dotBought = filterLinea !== 'TODAS' ? c.bought[filterLinea] : c.anyBought;

    html += `
    <div class="cliente-item">
      <div class="cliente-status ${dotBought ? 'status-ok' : 'status-no'}"></div>
      <div style="flex:1;min-width:0">
        <div class="cliente-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.nombre}</div>
        <div class="cliente-barrio">${c.barrio}</div>
      </div>
      <div class="cliente-lines">
        ${['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].map(line => {
          const isActive = filterLinea === line;
          return `<div class="cl-dot ${c.bought[line]?'bought':''}"
            style="background:${LINE_COLORS[line]};${isActive?'width:9px;height:9px;':''}"
            title="${line}"></div>`;
        }).join('')}
      </div>
    </div>`;
  });

  if (filtered.length > 300) {
    html += `<div style="text-align:center;padding:10px;color:var(--muted);font-size:12px">... y ${filtered.length - 300} más. Usá el buscador.</div>`;
  }

  if (filtered.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🔍</div><div>No hay clientes con ese filtro</div></div>`;
  }

  // Extra compradores not in ruta
  const allCompradores = new Set(
    Object.values(lines_data).flatMap(l => l.compradores || []).map(n => n.toLowerCase().trim())
  );
  const rutaNames = new Set(uniqueClientes.map(c => c.nombre.toLowerCase().trim()));
  const extraCompradores = [...allCompradores].filter(n => !rutaNames.has(n));

  if (extraCompradores.length > 0 && !search && filterGrupo !== 'NO_COMPRADORES') {
    html += `<div style="margin-top:12px;padding:10px;background:rgba(234,179,8,0.08);border-radius:8px;border:1px solid rgba(234,179,8,0.2)">
      <div style="font-size:11px;color:#eab308;font-weight:700;margin-bottom:6px">⚠ ${extraCompradores.length} COMPRADORES FUERA DE RUTA ASIGNADA</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.6">${extraCompradores.slice(0, 12).join(' · ')}${extraCompradores.length > 12 ? ' · ...' : ''}</div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('clientes-content').innerHTML = html;

  // Re-attach search event
  const searchEl = document.getElementById('clienteSearch');
  if (searchEl) searchEl.addEventListener('input', filterClientes);
}

function filterClientes() {
  clienteFilter = document.getElementById('clienteSearch')?.value || '';
  renderClientes();
}

function setGrupoFilter(grupo) {
  filterGrupo = grupo;
  renderClientes();
}

function setLineaFilter(linea) {
  filterLinea = linea;
  renderClientes();
}

function resetFiltros() {
  filterGrupo = 'TODOS';
  filterLinea = 'TODAS';
  clienteFilter = '';
  renderClientes();
}

// ===== HISTORICO =====
function renderHistorico() {
  const v = DATA[currentVendor];
  const hist = v.historico;
  const vname = currentVendor === 'SANTIAGO ROMERO' ? 'Santiago Romero' : currentVendor;

  let html = `<div class="section-title">Evolución Mensual · ${vname}</div>`;

  ['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].forEach(line => {
    const color = LINE_COLORS[line];
    const meta = LINE_METAS[line];
    
    html += `<div class="hist-table" style="margin-bottom:12px">
      <div style="padding:10px 12px;background:rgba(0,0,0,0.3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:0.5px">${line}</span>
        <span style="font-size:10px;color:var(--muted);text-transform:uppercase">Meta: ${(meta*100).toFixed(0)}%</span>
      </div>`;

    // Mini trend bars
    const maxCompradores = Math.max(...MONTHS.map(m => hist[m]?.[line]?.compradores || 0));
    html += `<div style="padding:10px 12px;border-bottom:1px solid var(--border)">
      <div style="display:flex;gap:6px;align-items:flex-end;height:40px;margin-bottom:4px">`;
    
    MONTHS.forEach((m, i) => {
      const d = hist[m]?.[line] || {};
      const h = maxCompradores > 0 ? Math.max(4, (d.compradores / maxCompradores) * 36) : 4;
      const c = pctColor(d.cobertura_pct || 0, meta);
      const isAbril = i === 3;
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="font-size:9px;color:var(--muted);font-weight:600">${(d.cobertura_pct*100||0).toFixed(0)}%</div>
        <div style="width:100%;height:${h}px;background:${c};border-radius:2px 2px 0 0;opacity:${isAbril?1:0.5}"></div>
        <div style="font-size:9px;color:${isAbril?'var(--text)':'var(--muted)'}";font-weight:${isAbril?700:400}>${MONTH_LABELS[i]}</div>
      </div>`;
    });

    html += `</div></div>`;

    // Table rows
    MONTHS.forEach((m, i) => {
      const d = hist[m]?.[line] || {};
      const isAbril = i === 3;
      const pct = d.cobertura_pct || 0;
      const color2 = pctColor(pct, meta);
      html += `<div class="hist-row ${isAbril?'hist-row-abril':''}" style="grid-template-columns:70px 1fr 1fr 1fr">
        <div style="font-weight:${isAbril?700:400};color:${isAbril?'#93c5fd':'var(--muted)'};font-size:12px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase">${MONTH_LABELS[i]}</div>
        <div class="hist-cell">
          <span class="hist-cell-val" style="color:${color2}">${(pct*100).toFixed(1)}%</span>
          <span class="hist-cell-sub">cobertura</span>
        </div>
        <div class="hist-cell">
          <span class="hist-cell-val">${d.compradores||0}</span>
          <span class="hist-cell-sub">clientes</span>
        </div>
        <div class="hist-cell">
          <span class="hist-cell-val">Gs ${formatGs(d.vendido||0)}</span>
          <span class="hist-cell-sub">vendido</span>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  document.getElementById('historico-content').innerHTML = html;
}

// ===== RESUMEN GENERAL =====
function renderResumen() {
  let html = `<div class="section-title">Resumen Equipo · Abril 2026</div>`;
  html += `<div class="summary-table">`;

  // Sort by tortuguita cobertura desc
  const vendors = Object.keys(DATA).sort((a, b) => {
    const pa = DATA[a].lines['TORTUGUITA']?.cobertura_pct || 0;
    const pb = DATA[b].lines['TORTUGUITA']?.cobertura_pct || 0;
    return pb - pa;
  });

  vendors.forEach(v => {
    const vd = DATA[v];
    const vname = v === 'SANTIAGO ROMERO' ? 'Santiago Romero' : v;
    const lines = vd.lines;

    html += `<div class="sum-row" onclick="selectVendorAndTab('${v}','cobertura')">
      <div class="sum-row-title">
        <span class="sum-vendor-name">${vname}</span>
        <span class="sum-clientes">${vd.total_clientes_ruta} clientes</span>
      </div>
      <div class="sum-lines-row">`;

    ['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].forEach(line => {
      const ld = lines[line];
      const meta = ld.meta_pct;
      const pct = ld.cobertura_pct;
      const c = LINE_COLORS[line];
      const fc = pctColor(pct, meta);
      
      html += `<div class="sum-line-chip" style="background:${fc}20;border-color:${fc}40">
        <div style="width:5px;height:5px;border-radius:50%;background:${c}"></div>
        <span style="color:${fc};font-size:10px;font-weight:700">${(pct*100).toFixed(0)}%</span>
      </div>`;
    });

    html += `</div>
      <div style="margin-top:6px;font-size:10px;color:var(--muted)">
        ${['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].map(l => 
          `<span style="margin-right:8px">${l.split(' ')[0]}: ${lines[l].total_compradores}/${vd.total_clientes_ruta}</span>`
        ).join('')}
      </div>
    </div>`;
  });

  html += `</div>`;

  // Global stats
  html += `<div class="section-title" style="margin-top:16px">Leyenda de Metas</div>`;
  html += `<div class="hist-table">`;
  ['TORTUGUITA','MOGUL','ROCKLETS','SALADIX','MENTHO PLUS'].forEach(line => {
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border)">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:${LINE_COLORS[line]};text-transform:uppercase;font-size:14px">${line}</span>
      <span style="font-size:13px;font-weight:700;color:var(--text)">${(LINE_METAS[line]*100).toFixed(0)}% de cobertura</span>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('resumen-content').innerHTML = html;
}

function selectVendorAndTab(vendor, tab) {
  document.getElementById('vendedorSelect').value = vendor;
  currentVendor = vendor;
  renderAll();
  switchTab(tab);
}

// Start
init();
</script>

</html>
